<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Number</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Counting Number</h1>
        
        <div id="display">0</div>
        
        <div class="controls">
            <div class="radio-group">
                <label>
                    <input type="radio" name="mode" value="counting" id="modeCounting"> Counting
                </label>
                <label>
                    <input type="radio" name="mode" value="timer" id="modeTimer" checked> Timer
                </label>
            </div>
            
            <div class="group" id="countingGroup">
                <h3>Counting</h3>
                
                <div class="field">
                    <label for="startNumber">Start Number:</label>
                    <input type="number" id="startNumber" value="0">
                </div>
                
                <div class="field">
                    <label for="endNumber">End Number:</label>
                    <input type="number" id="endNumber" value="100">
                </div>
                
                <div class="field">
                    <label for="duration">Duration (seconds):</label>
                    <input type="number" id="duration" value="5" min="1">
                </div>
                
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="easingIn"> Easing In
                    </label>
                    <label>
                        <input type="checkbox" id="easingOut"> Easing Out
                    </label>
                    <label>
                        <input type="checkbox" id="countdown"> Countdown
                    </label>
                </div>
            </div>
            
            <div class="group" id="timerGroup">
                <h3>Timer</h3>
                
                <div class="field">
                    <label for="seconds">Seconds:</label>
                    <input type="number" id="seconds" value="60" min="0">
                </div>
                
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="hours"> Hours
                    </label>
                    <label>
                        <input type="checkbox" id="clock"> Clock
                    </label>
                    <label>
                        <input type="checkbox" id="complete"> 24-Hour
                    </label>
                    <label>
                        <input type="checkbox" id="stopwatch"> Stopwatch
                    </label>
                </div>
            </div>

            <div class="group" id="fontGroup">
                <h3>Font</h3>
                
                <div class="field">
                    <label for="fontFamily">Font Family:</label>
                    <input type="text" id="fontFamily" value="Arial" placeholder="Open Sans">
                </div>
                
                <div class="field">
                    <label for="fontWeight">Weight:</label>
                    <input type="number" id="fontWeight" value="400" min="100" max="900" step="100">
                </div>

                <div class="field">
                    <label for="fontSize">Size:</label>
                    <input type="number" id="fontSize" value="64" min="1" max="500">
                </div>
                
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="fontItalic"> Italic
                    </label>
                </div>

                <div class="field color-field">
                    <label>Background:</label>
                    <input type="color" id="displayBackgroundColor" value="#000000">
                    <input type="text" id="displayBackground" value="#000000">
                </div>
                
                <div class="field color-field">
                    <label>Text Color:</label>
                    <input type="color" id="displayTextColorColor" value="#00d4ff">
                    <input type="text" id="displayTextColor" value="#00d4ff">
                </div>
                
                <div class="field">
                    <label for="renderAspect">Aspect Ratio:</label>
                    <select id="renderAspect">
                        <option value="16x9" selected>16:9</option>
                        <option value="4x3">4:3</option>
                        <option value="1x1">1:1</option>
                        <option value="9x16">9:16 (Portrait)</option>
                        <option value="3x4">3:4 (Portrait)</option>
                    </select>
                </div>

                <div class="field">
                    <label for="renderResolution">Resolution:</label>
                    <select id="renderResolution">
                        <option value="426x240">240p</option>
                        <option value="640x360">360p</option>
                        <option value="854x480">480p</option>
                        <option value="1280x720" selected>720p</option>
                        <option value="1920x1080">1080p</option>
                        <option value="2560x1440">1440p</option>
                    </select>
                </div>
            </div>
            
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="resetBtn">Reset</button>
            <button id="renderBtn">Render</button>
        </div>
    </div>
    
    <canvas id="renderCanvas" style="display: none;"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
